services:
  db:
    image: postgres:17-alpine
    env_file:
      - .env
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /dev/null:/var/lib/postgresql/data/postmaster.pid  # защита от блокировок при падении
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      web:
        condition: service_started
    restart: unless-stopped


  web:
    build: .
    command:
      sh -c "
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput &&
      python manage.py create_superuser &&
      gunicorn backend.asgi:application -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
      "
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    restart: unless-stopped

  celery:
    build: .
    command: [ "celery", "-A", "backend", "worker", "--concurrency=1", "--max-tasks-per-child=1" ]
    mem_limit: 2g
    cpus: '1.0'
    volumes:
      - .:/app
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped


volumes:
  media_volume:
    driver: local
  static_volume:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local