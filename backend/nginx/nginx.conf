upstream django {
    server web:8000;  # web - как в docker compose
}

server {
    listen 80;
    listen [::]:80;
    server_name hm-av.ru www.hm-av.ru;

    location /.well-know/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    client_max_body_size 200M;  # для загрузки файлов

    # Увеличение таймаутов для долгих запросов
    proxy_buffering off; # не кэширует большие ответы
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    # Для больших запросов
    client_body_timeout 300s;
    client_header_timeout 300s;
    keepalive_timeout 300s;
    send_timeout 300s;

    # Статические файлы
    location /static/ {
        alias /app/staticfiles/;
        expires 10m;
    }

    # Медиа файлы
    location /media/ {
        alias /app/media/;
        expires 10m;
    }

    # Все остальные запросы → Django
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}